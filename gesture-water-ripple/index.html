<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Tracking Water Ripples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-msg {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: #1a1a1a;
            border-radius: 12px;
            color: #ff4444;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 class="text-xl font-semibold mb-2">Initializing Experience</h2>
        <p class="text-gray-400 text-sm">Loading camera and AI models...</p>
    </div>

    <div id="error-msg">
        <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <h2 class="text-2xl font-bold mb-2">Camera Error</h2>
        <p id="error-text" class="text-gray-300">Please allow camera access to use this app.</p>
    </div>

    <div id="canvas-container">
        <canvas id="output"></canvas>
    </div>

    <script>
        const video = document.createElement('video');
        video.playsInline = true;
        video.muted = true;
        video.autoplay = true;

        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Offscreen canvas for getting video pixels
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');

        // Internal resolution for processing (balance between quality and performance)
        const W = 640;
        const H = 480;
        canvas.width = W;
        canvas.height = H;
        offCanvas.width = W;
        offCanvas.height = H;

        // Water Ripple Buffers
        const size = W * H;
        let buf1 = new Float32Array(size);
        let buf2 = new Float32Array(size);
        const damping = 0.99; // Increased for longer lasting fluid flow

        let hands;
        let handLandmarks = [];
        let prevHandPoints = {};
        let isReady = false;

        // Hand connections for drawing skeleton
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4], // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8], // Index
            [5, 9], [9, 10], [10, 11], [11, 12], // Middle
            [9, 13], [13, 14], [14, 15], [15, 16], // Ring
            [13, 17], [17, 18], [18, 19], [19, 20], // Pinky
            [0, 17] // Palm base
        ];

        function showError(msg) {
            loadingEl.style.display = 'none';
            canvas.style.display = 'none';
            errorEl.style.display = 'flex';
            errorText.textContent = msg;
        }

        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('Camera API not available. Ensure HTTPS and browser permissions.');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: W }, height: { ideal: H }, facingMode: 'user' }
                });
                video.srcObject = stream;
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (e) {
                showError(e.message || 'Failed to access camera.');
                throw e;
            }
        }

        async function initMediaPipe() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
            });
            hands.setOptions({
                maxNumFaces: 0,
                maxNumHands: 2,
                modelComplexity: 0, // 0 is faster, 1 is more accurate
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults((results) => {
                handLandmarks = results.multiHandLandmarks || [];
            });
        }

        function addDrop(x, y, radius, strength) {
            x = Math.floor(x);
            y = Math.floor(y);
            if (x < 0 || x >= W || y < 0 || y >= H) return;
            
            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    const distSq = dx * dx + dy * dy;
                    if (distSq <= radius * radius) {
                        const px = x + dx;
                        const py = y + dy;
                        if (px > 0 && px < W - 1 && py > 0 && py < H - 1) {
                            const dist = Math.sqrt(distSq);
                            // Smooth cosine falloff for softer edges
                            const falloff = (Math.cos((dist / radius) * Math.PI) + 1) * 0.5;
                            buf1[py * W + px] -= strength * falloff;
                        }
                    }
                }
            }
        }

        function processRipples() {
            // Update physics
            for (let i = W; i < size - W; i++) {
                if (i % W === 0 || i % W === W - 1) continue; // Skip edges
                buf2[i] = ((buf1[i - 1] + buf1[i + 1] + buf1[i - W] + buf1[i + W]) * 0.5) - buf2[i];
                buf2[i] *= damping;
            }
            // Swap buffers
            let temp = buf1;
            buf1 = buf2;
            buf2 = temp;
        }

        function renderFrame() {
            if (!isReady) return;

            // 1. Draw mirrored video to offscreen canvas
            offCtx.save();
            offCtx.scale(-1, 1);
            offCtx.drawImage(video, -W, 0, W, H);
            offCtx.restore();

            const srcImgData = offCtx.getImageData(0, 0, W, H);
            const srcData = new Uint32Array(srcImgData.data.buffer);
            
            const dstImgData = ctx.createImageData(W, H);
            const dstData = new Uint32Array(dstImgData.data.buffer);

            // 2. Apply water displacement
            for (let y = 1; y < H - 1; y++) {
                for (let x = 1; x < W - 1; x++) {
                    const i = y * W + x;
                    
                    // Calculate gradient
                    const xoff = Math.floor(buf1[i - 1] - buf1[i + 1]);
                    const yoff = Math.floor(buf1[i - W] - buf1[i + W]);

                    let srcX = x + xoff;
                    let srcY = y + yoff;

                    // Clamp
                    if (srcX < 0) srcX = 0;
                    if (srcX >= W) srcX = W - 1;
                    if (srcY < 0) srcY = 0;
                    if (srcY >= H) srcY = H - 1;

                    // Add slight shading based on displacement for realism
                    let pixel = srcData[srcY * W + srcX];
                    
                    let r = (pixel & 0xff);
                    let g = ((pixel >> 8) & 0xff);
                    let b = ((pixel >> 16) & 0xff);
                    
                    // Shading based on gradient (simulates light reflection/refraction)
                    let shade = (xoff + yoff) * 0.3; // More subtle shading for clearer transparency
                    r = Math.min(255, Math.max(0, r + shade));
                    g = Math.min(255, Math.max(0, g + shade));
                    b = Math.min(255, Math.max(0, b + shade));
                    
                    dstData[i] = (255 << 24) | (b << 16) | (g << 8) | r;
                }
            }

            // 3. Put displaced image to main canvas
            ctx.putImageData(dstImgData, 0, 0);

            // 4. Handle hands and draw skeleton
            if (handLandmarks.length > 0) {
                const currentHandPoints = {};
                handLandmarks.forEach((landmarks, handIdx) => {
                    // Add ripples at fingertips only (removed palm base to avoid center circle)
                    const triggerPoints = [4, 8, 12, 16, 20]; 
                    triggerPoints.forEach(idx => {
                        const lm = landmarks[idx];
                        // Mirror X because we mirrored the video
                        const cx = (1 - lm.x) * W;
                        const cy = lm.y * H;
                        
                        const pointId = handIdx + '_' + idx;
                        currentHandPoints[pointId] = {x: cx, y: cy};
                        
                        // Interpolate from previous position for continuous fluid flow
                        if (prevHandPoints[pointId]) {
                            const px = prevHandPoints[pointId].x;
                            const py = prevHandPoints[pointId].y;
                            const dist = Math.hypot(cx - px, cy - py);
                            const steps = Math.max(1, Math.floor(dist / 4));
                            
                            for (let i = 0; i <= steps; i++) {
                                const ix = px + (cx - px) * (i / steps);
                                const iy = py + (cy - py) * (i / steps);
                                addDrop(ix, iy, 16, 12); 
                            }
                        } else {
                            addDrop(cx, cy, 16, 12);
                        }
                    });

                    // Draw connections
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    HAND_CONNECTIONS.forEach(([i, j]) => {
                        const p1 = landmarks[i];
                        const p2 = landmarks[j];
                        ctx.beginPath();
                        ctx.moveTo((1 - p1.x) * W, p1.y * H);
                        ctx.lineTo((1 - p2.x) * W, p2.y * H);
                        ctx.stroke();
                    });

                    // Draw joints
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    landmarks.forEach((lm) => {
                        ctx.beginPath();
                        ctx.arc((1 - lm.x) * W, lm.y * H, 3, 0, 2 * Math.PI);
                        ctx.fill();
                    });
                });
                prevHandPoints = currentHandPoints;
            } else {
                prevHandPoints = {};
            }
        }

        let lastVideoTime = -1;
        async function loop() {
            if (video.readyState >= 2) {
                // Throttle MediaPipe processing to video framerate
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    try {
                        await hands.send({ image: video });
                    } catch (e) {
                        console.error("MediaPipe Error:", e);
                    }
                }
            }
            
            processRipples();
            renderFrame();
            
            requestAnimationFrame(loop);
        }

        // Mouse/Touch Interaction for water
        function handleInput(e) {
            if (!isReady) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            addDrop(x, y, 18, 60);
        }

        canvas.addEventListener('mousedown', handleInput, { passive: false });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) handleInput(e);
        }, { passive: false });
        canvas.addEventListener('touchstart', handleInput, { passive: false });
        canvas.addEventListener('touchmove', handleInput, { passive: false });

        // Resize handling
        function resize() {
            const aspect = W / H;
            const windowAspect = window.innerWidth / window.innerHeight;
            if (windowAspect > aspect) {
                canvas.style.width = 'auto';
                canvas.style.height = '100%';
            } else {
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Boot sequence
        async function boot() {
            try {
                await startCamera();
                await initMediaPipe();
                
                isReady = true;
                loadingEl.style.opacity = '0';
                setTimeout(() => loadingEl.style.display = 'none', 500);
                
                requestAnimationFrame(loop);
            } catch (e) {
                console.error(e);
            }
        }

        boot();

    </script>
</body>
</html>
